<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENGAR | AI/ML</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .terminal {
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,255,65,0.1);
            max-width: 600px;
            width: 90%;
        }
        h1 { font-size: 2rem; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .cursor { display: inline-block; width: 10px; height: 20px; background-color: #00ff41; animation: blink 1s step-end infinite; vertical-align: bottom;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>guest@mengar:~$<span class="cursor"></span></h1>
        <p>> System initialized.</p>
        <p>> Loading Machine Learning models...</p>
        <p>> STATUS: Portfolio under construction.</p>
    </div>
</body>
</html>
